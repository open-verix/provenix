name: Attest Provenix Binary

on:
  push:
    tags: ["v*"]
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write # OIDC token for keyless signing
  contents: write # Upload attestation to releases
  packages: write # Publish to GitHub Packages (future)
  security-events: write # Upload Trivy SARIF results to GitHub Security

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"
          cache: true

      - name: Run tests
        run: |
          go test ./... -v -race -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage
        id: codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          flags: unittests
          name: codecov-provenix
          fail_ci_if_error: false

      - name: Warn if Codecov upload failed
        if: steps.codecov.outcome == 'failure'
        run: |
          echo "::warning::Codecov upload failed. This is optional for alpha releases."

  build-multiplatform:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runs-on }}
    needs: test
    strategy:
      matrix:
        include:
          # macOS
          - goos: darwin
            goarch: amd64
            runs-on: macos-12
          - goos: darwin
            goarch: arm64
            runs-on: macos-latest
          # Linux
          - goos: linux
            goarch: amd64
            runs-on: ubuntu-latest
          - goos: linux
            goarch: arm64
            runs-on: ubuntu-latest
          # Windows
          - goos: windows
            goarch: amd64
            runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          COMMIT="${GITHUB_SHA::8}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          BINARY_NAME="provenix"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="provenix.exe"
          fi

          go build -trimpath -buildvcs=false \
            -ldflags="-s -w \
              -X github.com/open-verix/provenix/internal/cli.Version=${VERSION} \
              -X github.com/open-verix/provenix/internal/cli.GitCommit=${COMMIT}" \
            -o "${BINARY_NAME}" ./cmd/provenix

      - name: Verify binary exists
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ls -lh provenix.exe
            file provenix.exe || echo "file command not available on Windows"
          else
            ls -lh provenix
            file provenix || echo "Built for ${{ matrix.goos }}-${{ matrix.goarch }}"
          fi

      - name: Test binary (native builds only)
        # Only run on native builds (not cross-compiled)
        # Linux arm64 is cross-compiled on ubuntu-latest (amd64), so skip it
        if: |
          (matrix.goos == 'darwin' && matrix.goarch == 'amd64' && matrix.runs-on == 'macos-12') ||
          (matrix.goos == 'darwin' && matrix.goarch == 'arm64' && matrix.runs-on == 'macos-latest') ||
          (matrix.goos == 'linux' && matrix.goarch == 'amd64' && matrix.runs-on == 'ubuntu-latest') ||
          (matrix.goos == 'windows' && matrix.goarch == 'amd64' && matrix.runs-on == 'windows-latest')
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ./provenix.exe --version
          else
            chmod +x provenix
            ./provenix --version
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: provenix-${{ matrix.goos }}-${{ matrix.goarch }}
          path: provenix${{ matrix.goos == 'windows' && '.exe' || '' }}
          retention-days: 30

  attest-self:
    name: Dog Fooding - Attest Provenix with Itself
    runs-on: ubuntu-24.04 # Pinned for reproducible builds
    needs: build-multiplatform
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main')
    permissions:
      id-token: write # Required for OIDC token
      contents: write # Required for creating GitHub releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: provenix-linux-amd64

      - name: Make binary executable
        run: chmod +x provenix

      - name: Generate Attestation (Dog Fooding)
        id: attest
        run: |
          # Retry logic for transient OIDC failures (GitHub Actions 503 errors)
          MAX_RETRIES=3
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES: Attesting Provenix binary..."
            
            if ./provenix attest provenix \
              --format cyclonedx-json \
              --output attestation.json \
              --skip-transparency; then
              echo "✓ Attestation successful"
              break
            else
              EXIT_CODE=$?
              if [ $i -lt $MAX_RETRIES ]; then
                echo "⚠️  Attempt $i failed (exit $EXIT_CODE), retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
              else
                echo "❌ All $MAX_RETRIES attempts failed"
                exit $EXIT_CODE
              fi
            fi
          done

          # Show attestation summary
          echo "Attestation generated:"
          STATEMENT=$(jq -r '.statementBase64' attestation.json | base64 -d)
          echo "$STATEMENT" | jq -r '.subject[0].name, .subject[0].digest.sha256, .predicate.metadata.generatedAt' || true

      - name: Validate attestation structure
        run: |
          # Verify attestation is valid JSON
          jq empty attestation.json

          # Check top-level fields (in-toto bundle format)
          jq -e '.signature' attestation.json
          jq -e '.statementBase64' attestation.json
          jq -e '.publicKey' attestation.json

          # Decode and check statement fields
          STATEMENT=$(jq -r '.statementBase64' attestation.json | base64 -d)
          echo "$STATEMENT" | jq -e '.subject'
          echo "$STATEMENT" | jq -e '.predicate.sbom'
          echo "$STATEMENT" | jq -e '.predicate.vulnerabilityReport'
          echo "$STATEMENT" | jq -e '.predicate.metadata'

          echo "✓ Attestation structure validated"

      - name: Generate SBOM summary
        run: |
          echo "## SBOM Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Decode statement
          STATEMENT=$(jq -r '.statementBase64' attestation.json | base64 -d)

          # Extract artifact info
          ARTIFACT=$(echo "$STATEMENT" | jq -r '.subject[0].name' 2>/dev/null || echo "N/A")
          echo "- **Artifact:** ${ARTIFACT}" >> $GITHUB_STEP_SUMMARY

          DIGEST=$(echo "$STATEMENT" | jq -r '.subject[0].digest.sha256' 2>/dev/null || echo "N/A")
          echo "- **SHA256:** ${DIGEST:0:16}..." >> $GITHUB_STEP_SUMMARY

          # Extract SBOM info
          TOTAL_PACKAGES=$(echo "$STATEMENT" | jq '.predicate.sbom.content | fromjson | .components | length' 2>/dev/null || echo "N/A")
          echo "- **Total Packages:** ${TOTAL_PACKAGES}" >> $GITHUB_STEP_SUMMARY

          VULN_COUNT=$(echo "$STATEMENT" | jq '.predicate.vulnerabilityReport.vulnerabilities | length' 2>/dev/null || echo "0")
          echo "- **Vulnerabilities Found:** ${VULN_COUNT}" >> $GITHUB_STEP_SUMMARY

          FORMAT=$(echo "$STATEMENT" | jq -r '.predicate.sbom.format' 2>/dev/null || echo "N/A")
          echo "- **SBOM Format:** ${FORMAT}" >> $GITHUB_STEP_SUMMARY

          SIGNER=$(echo "$STATEMENT" | jq -r '.predicate.metadata.signerProvider.name' 2>/dev/null || echo "N/A")
          echo "- **Signer:** ${SIGNER}" >> $GITHUB_STEP_SUMMARY

      - name: Upload attestation artifact
        uses: actions/upload-artifact@v4
        with:
          name: provenix-attestation-${{ github.sha }}
          path: attestation.json
          retention-days: 90

  package-release:
    name: Package Release Archives
    runs-on: ubuntu-latest
    needs: [build-multiplatform, attest-self]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archives
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release

          # Function to create archive
          create_archive() {
            local GOOS=$1
            local GOARCH=$2
            local ARCHIVE_NAME="provenix_${VERSION}_${GOOS}_${GOARCH}"
            local ARTIFACT_DIR="artifacts/provenix-${GOOS}-${GOARCH}"
            
            echo "Creating archive for ${GOOS}-${GOARCH}..."
            
            # Copy README to artifact directory
            cp README.md "${ARTIFACT_DIR}/"
            
            if [ "$GOOS" = "windows" ]; then
              # Windows: ZIP archive
              cd "${ARTIFACT_DIR}"
              zip "../../../release/${ARCHIVE_NAME}.zip" provenix.exe README.md
              cd ../../..
            else
              # Unix: tar.gz archive
              cd "${ARTIFACT_DIR}"
              tar -czf "../../../release/${ARCHIVE_NAME}.tar.gz" provenix README.md
              cd ../../..
            fi
          }

          # Create archives for all platforms
          create_archive darwin amd64
          create_archive darwin arm64
          create_archive linux amd64
          create_archive linux arm64
          create_archive windows amd64

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Copy attestation
        run: |
          cp artifacts/provenix-attestation-${{ github.sha }}/attestation.json release/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release/*
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: package-release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## Provenix ${{ github.ref_name }}

            ### Multi-Platform Binaries

            Download the appropriate binary for your platform:

            - **macOS (Intel):** `provenix_${{ github.ref_name }}_darwin_amd64.tar.gz`
            - **macOS (Apple Silicon):** `provenix_${{ github.ref_name }}_darwin_arm64.tar.gz`
            - **Linux (amd64):** `provenix_${{ github.ref_name }}_linux_amd64.tar.gz`
            - **Linux (arm64):** `provenix_${{ github.ref_name }}_linux_arm64.tar.gz`
            - **Windows:** `provenix_${{ github.ref_name }}_windows_amd64.zip`

            ### Quick Install

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/open-verix/provenix/main/scripts/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            iwr -useb https://raw.githubusercontent.com/open-verix/provenix/main/scripts/install.ps1 | iex
            ```

            ### Verification

            ```bash
            # Verify checksum
            sha256sum -c checksums.txt

            # Verify attestation (future)
            ./provenix verify attestation.json
            ```

            ### Attestation

            This release includes `attestation.json` generated by Provenix itself (dog fooding):
            - ✅ Atomic evidence generation
            - ✅ SBOM transparency (CycloneDX)
            - ✅ Vulnerability disclosure
            - ✅ Cryptographic signing (keyless)

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-24.04 # Pinned for reproducible builds
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
